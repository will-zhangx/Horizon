# 放入 fork 后的 Horizon 仓库：.github/workflows/main.yml
# 每天推送两次：早上 7:00 + 下午 5:00（北京时间）

name: Will 投资雷达

on:
  schedule:
    - cron: '0 23 * * *'   # 北京时间 07:00 = UTC 23:00（前一天）
    - cron: '0 9 * * *'    # 北京时间 17:00 = UTC 09:00
  workflow_dispatch:        # 允许手动触发

jobs:
  run-horizon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Horizon
        run: uv sync

      - name: Copy config
        run: cp config.json data/config.json

      - name: Run Horizon
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: uv run horizon --hours 12

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horizon-report-${{ github.run_id }}
          path: data/summaries/
          retention-days: 7
